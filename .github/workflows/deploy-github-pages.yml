# Builds the Vite app and pushes ./dist to branch `gh-pages`.
#
# In the repo: Settings → Pages → Build and deployment → Source:
#   “Deploy from a branch” → Branch **gh-pages** → folder **/ (root)**
#
# (If Source is still “main” / (root), GitHub serves dev index.html and the app breaks.)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
